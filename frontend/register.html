<!-- =========================
     VOLUNTEER REGISTRATION
     Purpose:
     Allow users to register
     as volunteers to assist
     during flood emergencies.

     Contains:
     - Full Name
     - Email
     - Phone Number
     - Address
     - Skills
     - Availability
     - Register Button
========================= -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="css/register.css">
</head>
<body>
  <div class="container">
    <form class="register-form">
      <h2>Become a Volunteer</h2>
      <p>Join FloodShield and help communities during flood emergencies.</p>

      <!--Full Name-->
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input
         type="text"
          id="fullname"
           name="fullname"
            placeholder="Enter Full Name"
        required>
      </div>

      <!--Email-->
      <div class="form-group">
        <label for="email">Email</label>
        <input
         type="email"
          id="email"
           name="email"
            placeholder="Enter Your Email"
            required>
      </div>

         <!--Contact number-->
      <div class="form-group">
     <label for="contact">Contact Number</label>
             <input 
                type="tel"
                id="contact"
                name="contact"
                placeholder="Enter Contact Number"
                required>
     </div>


       <!--Address-->
      <div class="form-group">
        <label for="address"> Address</label>
        <textarea 
        id="address"
        name="address"
        rows="5"
        placeholder="Enter Your Address"
        required></textarea>
      </div>

<!-- Skills -->
<div class="form-group">
  <label>Skills</label>

  <div class="skills-options">

    <div class="skill-item">
      <input
        type="checkbox"
        id="rescue"
        name="skills"
        value="Rescue">
      <label for="rescue">Rescue</label>
    </div>

    <div class="skill-item">
      <input
        type="checkbox"
        id="first-aid"
        name="skills"
        value="First Aid">
      <label for="first-aid">First Aid</label>
    </div>

    <div class="skill-item">
      <input
        type="checkbox"
        id="food-distribution"
        name="skills"
        value="Food Distribution">
      <label for="food-distribution">Food Distribution</label>
    </div>

    <div class="skill-item">
      <input
        type="checkbox"
        id="medical-support"
        name="skills"
        value="Medical Support">
      <label for="medical-support">Medical Support</label>
    </div>

  </div>
</div>

<!-- Availability -->
<div class="form-group">
  <label>Availability</label>

  <div class="availability-options">

    <div class="availability-item">
      <input
        type="radio"
        id="weekdays"
        name="availability"
        value="Weekdays"
        required>
      <label for="weekdays">Weekdays</label>
    </div>

    <div class="availability-item">
      <input
        type="radio"
        id="weekends"
        name="availability"
        value="Weekends">
      <label for="weekends">Weekends</label>
    </div>

    <div class="availability-item">
      <input
        type="radio"
        id="anytime"
        name="availability"
        value="Anytime">
      <label for="anytime">Anytime</label>
    </div>

  </div>
</div>

<!-- Submit Button -->
<div class="form-group">
  <button class="submit-btn" type="submit">
    Register as Volunteer
  </button>
</div>
    </form>
  </div>

</body>
</html>
